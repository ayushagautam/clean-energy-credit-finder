/* ============================================================
   Clean Energy Credit Finder
   Design: calm light "instrument panel"; the signature element is
   the per-credit runway timeline (IRA ghost vs OBBBA stop vs today).
   Color encodes urgency and carries meaning, not decoration.
   ============================================================ */

:root {
  --bg:        #ebeee8;
  --paper:     #fbfcfa;
  --ink:       #14171a;
  --ink-soft:  #5b6168;
  --ink-faint: #8a9098;
  --line:      #dadfd6;
  --panel:     #14171a;     /* dark runway panel */
  --panel-2:   #1c2024;
  --panel-line:rgba(255,255,255,.13);
  --panel-ink: #e7eae6;
  --volt:      #2645dd;     /* interactive / selection (distinct from urgency) */

  /* urgency scale — meaningful */
  --expired:   #868c93;
  --urgent:    #cf3a22;
  --soon:      #bd7c16;
  --open:      #2a7a51;
  --context:   #868c93;

  --r:   14px;
  --r-s: 9px;
  --maxw: 1080px;

  --f-display: "Archivo", system-ui, sans-serif;
  --f-body:    "Inter", system-ui, sans-serif;
  --f-mono:    "IBM Plex Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

/* ---------- Masthead ---------- */
.masthead { padding: 56px 0 8px; }

.eyebrow {
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-soft);
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 22px;
}
.eyebrow b { color: var(--ink); font-weight: 600; }
.eyebrow .arrow { color: var(--urgent); }

h1 {
  font-family: var(--f-display);
  font-weight: 800;
  font-size: clamp(30px, 5.4vw, 54px);
  line-height: 1.03;
  letter-spacing: -0.02em;
  margin: 0 0 18px;
  max-width: 16ch;
}
h1 .cut { color: var(--urgent); }

.lede {
  font-size: clamp(16px, 2.1vw, 19px);
  color: var(--ink-soft);
  max-width: 56ch;
  margin: 0 0 4px;
}

/* ---------- Picker ---------- */
.picker {
  margin: 34px 0 8px;
  padding: 22px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r);
}
.picker-label {
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  display: block;
  margin: 0 0 10px;
}
.select-shell { position: relative; }
.select-shell::after {
  content: "";
  position: absolute;
  right: 18px; top: 50%;
  width: 9px; height: 9px;
  border-right: 2px solid var(--ink);
  border-bottom: 2px solid var(--ink);
  transform: translateY(-65%) rotate(45deg);
  pointer-events: none;
}
select#persona {
  appearance: none;
  -webkit-appearance: none;
  width: 100%;
  font-family: var(--f-display);
  font-weight: 600;
  font-size: clamp(18px, 2.6vw, 24px);
  color: var(--ink);
  background: transparent;
  border: 0;
  border-bottom: 2px solid var(--ink);
  border-radius: 0;
  padding: 8px 36px 10px 2px;
  cursor: pointer;
}
select#persona:focus-visible {
  outline: 3px solid var(--volt);
  outline-offset: 4px;
}
.persona-blurb {
  margin: 12px 2px 0;
  font-size: 14px;
  color: var(--ink-soft);
  min-height: 1.4em;
}

/* ---------- Summary strip ---------- */
.summary {
  display: none;
  margin: 28px 0 6px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  background: var(--panel);
  color: var(--panel-ink);
}
.summary.show { display: grid; grid-template-columns: 1.3fr 1fr 1fr; }

.summary .cell { padding: 20px 22px; border-right: 1px solid var(--panel-line); }
.summary .cell:last-child { border-right: 0; }
.summary .k {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(231,234,230,.6);
  margin: 0 0 8px;
}
.summary .v {
  font-family: var(--f-display);
  font-weight: 700;
  font-size: clamp(22px, 3.4vw, 30px);
  line-height: 1.1;
  letter-spacing: -0.01em;
}
.summary .v small { font-size: 14px; font-weight: 500; color: rgba(231,234,230,.65); display: block; margin-top: 4px; letter-spacing: 0; font-family: var(--f-body);}
.countdown {
  font-family: var(--f-mono);
  font-weight: 600;
  letter-spacing: .01em;
}
.countdown.is-urgent { color: #ff7a5e; }
.countdown.is-soon  { color: #f0b65b; }
.countdown.none     { color: rgba(231,234,230,.7); }

/* ---------- Results ---------- */
.results { margin: 26px 0 10px; display: grid; gap: 16px; }

.group-label {
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin: 22px 2px 2px;
  display: flex; align-items: center; gap: 10px;
}
.group-label::after { content:""; flex:1; height:1px; background:var(--line); }
.group-label:first-child { margin-top: 6px; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 20px 22px 22px;
  border-left: 4px solid var(--u, var(--line));
}
.card.context { opacity: .82; }

.card-top { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
.code {
  font-family: var(--f-mono);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: .02em;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--line);
  padding: 4px 9px;
  border-radius: 7px;
  white-space: nowrap;
}
.card h3 {
  font-family: var(--f-display);
  font-weight: 700;
  font-size: clamp(17px, 2.4vw, 21px);
  letter-spacing: -0.01em;
  margin: 0;
  flex: 1;
  min-width: 220px;
}
.badge {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .04em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 999px;
  color: #fff;
  background: var(--u, var(--ink-soft));
  white-space: nowrap;
}
.kind-tag {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.meta-row { display: flex; flex-wrap: wrap; gap: 8px 26px; margin: 14px 0 4px; }
.meta-row .m .ml {
  font-family: var(--f-mono);
  font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-faint); margin: 0 0 2px;
}
.meta-row .m .mv { font-size: 15px; font-weight: 600; }
.meta-row .m .mv.deadline { color: var(--u, var(--ink)); }

.elig { margin: 14px 0 0; font-size: 14.5px; color: var(--ink-soft); }
.elig b { color: var(--ink); font-weight: 600; }
.note {
  margin: 10px 0 0;
  font-size: 13px;
  color: var(--ink-soft);
  padding-left: 12px;
  border-left: 2px solid var(--line);
}
.source {
  margin: 12px 0 0;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .03em;
  color: var(--ink-faint);
}
.source a { color: var(--volt); text-decoration: none; border-bottom: 1px solid rgba(38,69,221,.3); }
.source a:hover { border-bottom-color: var(--volt); }
.source svg { vertical-align: -1px; margin-left: 3px; opacity: .6; }
.source .verified { color: var(--ink-faint); }

/* ---------- Runway signature ---------- */
.runway {
  margin: 18px 0 2px;
  background: var(--panel);
  border-radius: var(--r-s);
  padding: 16px 18px 14px;
  color: var(--panel-ink);
}
.runway-head {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: var(--f-mono); font-size: 11px; letter-spacing: .1em;
  text-transform: uppercase; color: rgba(231,234,230,.6); margin-bottom: 14px;
}
.runway-head .lost { color: #ff7a5e; }
.runway-head .lost.gain { color: #6fd39b; }
.runway-head .lost.none { color: rgba(231,234,230,.55); }

.track { position: relative; height: 8px; border-radius: 999px; background: var(--panel-2); }
.track .ghost {
  position: absolute; left: 0; top: 0; height: 100%;
  background: rgba(255,255,255,.16); border-radius: 999px;
}
.track .live {
  position: absolute; left: 0; top: 0; height: 100%;
  background: var(--u, var(--open)); border-radius: 999px;
}
.track .today {
  position: absolute; top: -5px; width: 2px; height: 18px;
  background: #fff; transform: translateX(-1px);
}
.track .today::after {
  content: "now"; position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  font-family: var(--f-mono); font-size: 9px; letter-spacing: .1em; color: rgba(255,255,255,.7);
}
.track .stop {
  position: absolute; top: -4px; width: 10px; height: 16px; border-radius: 3px;
  background: var(--u, var(--open)); transform: translateX(-5px);
  box-shadow: 0 0 0 2px var(--panel);
}
.track .ira-end {
  position: absolute; top: -4px; width: 2px; height: 16px;
  background: rgba(255,255,255,.45); transform: translateX(-1px);
}
.axis {
  display: flex; justify-content: space-between; margin-top: 26px;
  font-family: var(--f-mono); font-size: 10px; color: rgba(231,234,230,.45);
}
.legend {
  display: flex; gap: 18px; flex-wrap: wrap; margin-top: 12px;
  font-family: var(--f-mono); font-size: 10px; letter-spacing: .04em;
  color: rgba(231,234,230,.6);
}
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend i { width: 14px; height: 4px; border-radius: 2px; display: inline-block; }
.legend i.ghost { background: rgba(255,255,255,.4); }
.legend i.live  { background: var(--open); }

/* ---------- Empty / intro states ---------- */
.placeholder {
  margin: 30px 0;
  padding: 34px 24px;
  border: 1px dashed var(--line);
  border-radius: var(--r);
  color: var(--ink-soft);
  text-align: center;
  font-size: 15px;
}

/* ---------- Footer ---------- */
footer {
  margin: 50px 0 60px;
  padding-top: 22px;
  border-top: 1px solid var(--line);
  color: var(--ink-faint);
  font-size: 12.5px;
  line-height: 1.6;
}
footer .disc { color: var(--ink-soft); max-width: 70ch; }
footer a { color: var(--volt); }
footer .src { margin-top: 10px; font-family: var(--f-mono); font-size: 11px; }

/* ---------- Responsive ---------- */
@media (max-width: 760px) {
  .summary.show { grid-template-columns: 1fr; }
  .summary .cell { border-right: 0; border-bottom: 1px solid var(--panel-line); }
  .summary .cell:last-child { border-bottom: 0; }
  .masthead { padding-top: 38px; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

/* gentle reveal */
.card, .summary.show { animation: rise .4s ease both; }
@keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

</head>

  <script>
/* Clean Energy Credit Finder — app logic
   Pure vanilla JS, no build step. Reads window.CE_DATA (assets/data.js). */
(function () {
  "use strict";
  var DATA = window.CE_DATA;
  if (!DATA) { console.error("CE_DATA not loaded"); return; }

  var AXIS_START = 2025, AXIS_END = 2035, AXIS_SPAN = AXIS_END - AXIS_START;
  var DAY = 86400000;
  var POSITIVE = { Preserved: 1, Improved: 1, Extended: 1, Active: 1 };
  var CONTEXT = { Rescinded: 1, Restructured: 1 };

  var $ = function (s, r) { return (r || document).querySelector(s); };
  var el = function (tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  };
  var esc = function (s) {
    return String(s).replace(/[&<>]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c];
    });
  };

  function yearFraction(d) { // Date -> decimal year
    var y = d.getUTCFullYear();
    var start = Date.UTC(y, 0, 1), next = Date.UTC(y + 1, 0, 1);
    return y + (d.getTime() - start) / (next - start);
  }
  var NOW = new Date();
  var NOW_YF = yearFraction(NOW);

  function pct(year) {
    var p = ((year - AXIS_START) / AXIS_SPAN) * 100;
    return Math.max(0, Math.min(100, p));
  }

  // urgency bucket + color variable
  function classify(item) {
    if (CONTEXT[item.status]) return { group: "context", color: "var(--context)", days: null };
    if (!item.deadline_date) {
      return { group: "open", color: "var(--open)", days: null };
    }
    var dl = new Date(item.deadline_date + "T23:59:59Z");
    var days = Math.ceil((dl.getTime() - NOW.getTime()) / DAY);
    if (days < 0)   return { group: "expired", color: "var(--expired)", days: days };
    if (days <= 60) return { group: "urgent",  color: "var(--urgent)",  days: days };
    if (days <= 365) return { group: "soon",    color: "var(--soon)",    days: days };
    return { group: "open", color: "var(--open)", days: days };
  }

  var GROUP_ORDER = { urgent: 0, soon: 1, open: 2, expired: 3, context: 4 };
  var GROUP_TITLE = {
    urgent:  "Act now — closing within 60 days",
    soon:    "Plan ahead — closes within a year",
    open:    "Still open — longer runway",
    expired: "Window already closed",
    context: "Related programs (curtailed — for context)"
  };

  function fmtDate(iso) {
    if (!iso) return "";
    var p = String(iso).split("-");
    var mons = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var mon = mons[parseInt(p[1], 10) - 1] || "";
    return mon + " " + parseInt(p[2], 10) + ", " + p[0];
  }

  function fmtDays(days) {
    if (days == null) return "";
    if (days < 0) return Math.abs(days) + " days ago";
    if (days === 0) return "today";
    if (days === 1) return "1 day left";
    return days + " days left";
  }

  function runway(item, color) {
    var iraPos = pct(item.ira_end);
    var obbbaPos = pct(item.obbba_end);
    var todayPos = pct(NOW_YF);
    var lost = item.ira_end - item.obbba_end;
    var lostHtml, lostCls;
    if (lost > 0)      { lostHtml = lost + " yr" + (lost > 1 ? "s" : "") + " of runway cut"; lostCls = "lost"; }
    else if (lost < 0) { lostHtml = Math.abs(lost) + " yr added"; lostCls = "lost gain"; }
    else               { lostHtml = "timeline unchanged"; lostCls = "lost none"; }

    var n = el("div", "runway");
    n.innerHTML =
      '<div class="runway-head"><span>Credit runway</span><span class="' + lostCls + '">' + lostHtml + '</span></div>' +
      '<div class="track">' +
        '<div class="ghost" style="width:' + iraPos + '%"></div>' +
        '<div class="live" style="width:' + obbbaPos + '%;background:' + color + '"></div>' +
        '<div class="ira-end" style="left:' + iraPos + '%" title="Original IRA end ' + item.ira_end + '"></div>' +
        '<div class="stop" style="left:' + obbbaPos + '%;background:' + color + '" title="OBBBA end ' + item.obbba_end + '"></div>' +
        (todayPos > 0 && todayPos < 100 ? '<div class="today" style="left:' + todayPos + '%"></div>' : '') +
      '</div>' +
      '<div class="axis"><span>2025</span><span>2030</span><span>2035</span></div>' +
      '<div class="legend">' +
        '<span><i class="live" style="background:' + color + '"></i> OBBBA end ' + item.obbba_end + '</span>' +
        '<span><i class="ghost"></i> Original IRA end ' + item.ira_end + '</span>' +
      '</div>';
    return n;
  }

  function card(item) {
    var c = classify(item);
    var n = el("article", "card" + (c.group === "context" ? " context" : ""));
    n.style.setProperty("--u", c.color);

    var top = el("div", "card-top");
    top.appendChild(el("span", "code", esc(item.code)));
    top.appendChild(el("h3", null, esc(item.name)));
    top.appendChild(el("span", "badge", esc(item.status)));
    n.appendChild(top);

    var kindLabel = item.kind === "program"
      ? "Federal program · " + esc(item.agency || "")
      : "Federal tax " + (item.code === "179D" ? "deduction" : "credit") + " · IRC §" + esc(item.code);
    n.appendChild(el("div", "kind-tag", kindLabel));

    var deadlineText = item.deadline_label + (c.days != null && c.group !== "context"
      ? '  ·  <strong>' + fmtDays(c.days) + '</strong>' : "");
    var meta = el("div", "meta-row");
    meta.innerHTML =
      '<div class="m"><div class="ml">Worth</div><div class="mv">' + esc(item.value) + '</div></div>' +
      '<div class="m"><div class="ml">Sector</div><div class="mv">' + esc(item.sector) + '</div></div>' +
      '<div class="m"><div class="ml">Deadline</div><div class="mv deadline">' + deadlineText + '</div></div>';
    n.appendChild(meta);

    n.appendChild(runway(item, c.color));

    n.appendChild(el("p", "elig", "<b>Who qualifies:</b> " + esc(item.eligibility)));
    if (item.notes) n.appendChild(el("p", "note", esc(item.notes)));
    var verified = item.verified ? "Verified " + fmtDate(item.verified) : "";
    if (item.source_url) {
      var ext = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>';
      var src = el("p", "source");
      src.innerHTML = "Source: <a href=\"" + esc(item.source_url) + "\" target=\"_blank\" rel=\"noopener noreferrer\">" +
        esc(item.source_label || "official guidance") + ext + "</a>" +
        (verified ? '<span class="verified"> &middot; ' + esc(verified) + "</span>" : "");
      n.appendChild(src);
    } else if (verified) {
      n.appendChild(el("p", "source", '<span class="verified">' + esc(verified) + "</span>"));
    }
    return n;
  }

  // --- live countdown to the nearest still-open deadline ---
  var countdownTimer = null, countdownTarget = null;
  function pad(n) { return (n < 10 ? "0" : "") + n; }
  function tick() {
    if (!countdownTarget) return;
    var diff = countdownTarget.date.getTime() - Date.now();
    var node = $("#cd");
    if (!node) return;
    if (diff <= 0) { node.textContent = "closed"; return; }
    var d = Math.floor(diff / DAY);
    var h = Math.floor((diff % DAY) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    node.textContent = d + "d " + pad(h) + ":" + pad(m) + ":" + pad(s);
  }

  function summary(items) {
    var box = $("#summary");
    box.innerHTML = "";
    if (!items.length) { box.className = "summary"; return; }

    var classified = items.map(function (it) { return { it: it, c: classify(it) }; });
    var openish = classified.filter(function (x) {
      return (x.c.group === "urgent" || x.c.group === "soon") && x.c.days != null;
    }).sort(function (a, b) { return a.c.days - b.c.days; });

    var nearest = openish[0];
    var nValue = items.length + (items.length === 1 ? " incentive" : " incentives");
    var nActionable = classified.filter(function (x) {
      return x.c.group === "urgent" || x.c.group === "soon" || x.c.group === "open";
    }).length;

    var cdCell;
    if (nearest) {
      countdownTarget = { date: new Date(nearest.it.deadline_date + "T23:59:59") };
      var cls = nearest.c.group === "urgent" ? "is-urgent" : "is-soon";
      cdCell =
        '<div class="cell"><p class="k">Next deadline</p>' +
        '<div class="v countdown ' + cls + '"><span id="cd">—</span>' +
        '<small>' + esc(nearest.it.code) + " · " + esc(nearest.it.deadline_label) + '</small></div></div>';
    } else {
      countdownTarget = null;
      cdCell =
        '<div class="cell"><p class="k">Next deadline</p>' +
        '<div class="v countdown none">No near cutoff<small>Remaining credits have a longer runway</small></div></div>';
    }

    box.innerHTML =
      '<div class="cell"><p class="k">Available to you</p><div class="v">' + nValue +
        '<small>' + nActionable + ' still open or actionable</small></div></div>' +
      cdCell +
      '<div class="cell"><p class="k">Already closed</p><div class="v">' +
        classified.filter(function (x) { return x.c.group === "expired"; }).length +
        '<small>under OBBBA early repeal</small></div></div>';
    box.className = "summary show";

    if (countdownTimer) clearInterval(countdownTimer);
    if (countdownTarget && !window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      tick(); countdownTimer = setInterval(tick, 1000);
    } else if (countdownTarget) { tick(); }
  }

  function render(personaKey) {
    var results = $("#results");
    var summaryBox = $("#summary");
    results.innerHTML = "";

    if (!personaKey) {
      summaryBox.className = "summary";
      results.appendChild(el("div", "placeholder",
        "Select who you are above to see the clean-energy incentives you may qualify for, sorted by how soon they close."));
      return;
    }

    var items = DATA.items.filter(function (it) { return it.personas.indexOf(personaKey) !== -1; });

    summary(items);

    if (!items.length) {
      results.appendChild(el("div", "placeholder", "No incentives matched. Try another selection."));
      return;
    }

    var byGroup = {};
    items.forEach(function (it) {
      var g = classify(it).group;
      (byGroup[g] = byGroup[g] || []).push(it);
    });

    Object.keys(GROUP_ORDER).sort(function (a, b) { return GROUP_ORDER[a] - GROUP_ORDER[b]; })
      .forEach(function (g) {
        var list = byGroup[g];
        if (!list || !list.length) return;
        list.sort(function (a, b) {
          var ca = classify(a), cb = classify(b);
          if (ca.days == null && cb.days == null) return 0;
          if (ca.days == null) return 1;
          if (cb.days == null) return -1;
          return ca.days - cb.days;
        });
        results.appendChild(el("div", "group-label", GROUP_TITLE[g]));
        list.forEach(function (it) { results.appendChild(card(it)); });
      });
  }

  // --- init ---
  function init() {
    var meta = DATA.meta;
    $("#subtitle").textContent = meta.subtitle;
    $("#law-context").textContent = meta.law_context;
    $("#disclaimer").textContent = meta.disclaimer;
    $("#sources").textContent = "Sources: " + meta.sources;

    var sel = $("#persona");
    DATA.personas.forEach(function (p) {
      var o = el("option");
      o.value = p.key; o.textContent = p.label;
      sel.appendChild(o);
    });

    var blurb = $("#persona-blurb");
    function update() {
      var key = sel.value;
      var p = DATA.personas.filter(function (x) { return x.key === key; })[0];
      blurb.textContent = p ? p.blurb : "";
      render(key);
    }
    sel.addEventListener("change", update);
    update();
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();

  </script>
</body>
</html>
